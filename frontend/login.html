<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Acceso | Hospital San José</title>

  <!-- CSS GLOBAL -->
  <link rel="stylesheet" href="css/global.css">

  <!-- CSS SOLO LOGIN -->
  <link rel="stylesheet" href="css/login.css">

</head>

<body>

<!-- ========================= -->
<!-- LOGIN WRAPPER -->
<!-- ========================= -->
<div class="login-wrapper">

  <!-- ========================= -->
  <!-- IZQUIERDA (IMAGEN + INFO) -->
  <!-- ========================= -->
  <div class="login-hero">

    <div class="hero-content">
      <h1>🏥 Hospital San José</h1>

      <p>
        Plataforma de gestión hospitalaria en tiempo real para monitoreo de camas,
        indicadores clínicos y optimización de procesos asistenciales.
      </p>

      <div class="hero-stats">
        <div>
          <h3>+450</h3>
          <span>Camas</span>
        </div>
        <div>
          <h3>85%</h3>
          <span>Ocupación</span>
        </div>
        <div>
          <h3>24/7</h3>
          <span>Monitoreo</span>
        </div>
      </div>
    </div>

  </div>


  <!-- ========================= -->
  <!-- DERECHA (FORM LOGIN) -->
  <!-- ========================= -->
  <div class="login-container">

    <div class="login-box">

      <h2>Acceso al sistema</h2>
      <p class="subtitle">Ingresa tus credenciales institucionales</p>

      <input type="text" id="user" placeholder="Usuario">
      <input type="password" id="pass" placeholder="Contraseña">

      <!-- IMPORTANTE: ID para UX -->
      <button id="btn-login" onclick="login()">Ingresar</button>

      <p id="error" class="error"></p>

      <!-- DEMO -->
      <div class="quick-access">
        <span>Modo prueba:</span>
        <button onclick="demoLogin('admin')">Admin</button>
        <button onclick="demoLogin('medico')">Doctor</button>
      </div>

      <!-- VOLVER -->
      <div class="back-link">
        <a href="index.html">← Volver al inicio</a>
      </div>

    </div>

  </div>

</div>

<!-- ========================= -->
<!-- JS -->
<!-- ========================= -->
<script src="js/auth.js"></script>

</body>
</html>
