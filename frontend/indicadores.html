<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Indicadores | Hospital San José</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/indicadores.css">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="layout">

  <!-- ========================= -->
  <!-- SIDEBAR -->
  <!-- ========================= -->
  <aside class="sidebar">

    <div>
      <div class="logo">🏥 Hospital SJ</div>

      <ul class="menu" id="menu">
        <li data-page="dashboard.html">📊 Dashboard</li>
        <li data-page="camas.html">🛏️ Camas</li>
        <li data-page="indicadores.html">📈 Indicadores</li>
        <li data-page="configuracion.html">⚙️ Configuración</li>
        <li class="logout" onclick="logout()">🚪 Salir</li>
      </ul>
    </div>

    <div class="user-box" id="usuario"></div>

  </aside>


  <!-- ========================= -->
  <!-- MAIN -->
  <!-- ========================= -->
  <main class="main">

    <!-- HEADER -->
    <div class="topbar">
      <div>
        <h1>Indicadores Clínicos</h1>
        <span class="status">● En tiempo real</span>
      </div>
    </div>


    <!-- KPIs -->
    <section class="kpis">

      <div class="card kpi green">
        <span>TASA OCUPACIÓN</span>
        <h2>85%</h2>
      </div>

      <div class="card kpi orange">
        <span>ESPERA PROMEDIO</span>
        <h2>32 min</h2>
      </div>

      <div class="card kpi">
        <span>EGRESOS HOY</span>
        <h2>24</h2>
      </div>

      <div class="card kpi red">
        <span>UCI CRÍTICA</span>
        <h2>96%</h2>
      </div>

    </section>


    <!-- GRÁFICOS -->
    <section class="grid-2">

      <div class="card">
        <h3>📈 Ocupación mensual</h3>
        <div class="chart-container">
          <canvas id="ocupacionChart"></canvas>
        </div>
      </div>

      <div class="card">
        <h3>📊 Tiempo de espera</h3>
        <div class="chart-container">
          <canvas id="esperaChart"></canvas>
        </div>
      </div>

    </section>

  </main>

</div>


<!-- ========================= -->
<!-- SCRIPTS (ORDEN CORRECTO) -->
<!-- ========================= -->

<!-- 1. CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- 2. TU JS COMO MODULE -->
<script type="module" src="js/indicadores.js"></script>

<!-- 3. UI -->
<script>

document.addEventListener("DOMContentLoaded", () => {

  /* MENU ACTIVO */
  const menuItems = document.querySelectorAll("#menu li[data-page]");
  const currentPage = window.location.pathname.split("/").pop();

  menuItems.forEach(item => {

    if (item.dataset.page === currentPage) {
      item.classList.add("active");
    }

    item.addEventListener("click", () => {
      window.location.href = item.dataset.page;
    });

  });

  /* USUARIO */
  const usuario = JSON.parse(localStorage.getItem("auth"));

  if (usuario) {
    document.getElementById("usuario").innerText =
      `👤 ${usuario.username || "Usuario"}`;
  }

});


/* LOGOUT */
function logout() {
  localStorage.removeItem("auth");
  window.location.href = "login.html";
}

</script>

</body>
</html>
